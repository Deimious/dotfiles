# See: /usr/share/doc/mpd/mpdconf.example

pid_file "/home/baal/.mpd/mpd.pid"
db_file "/home/baal/.mpd/mpd.db"
state_file "/home/baal/.mpd/mpdstate"
playlist_directory "/home/baal/.mpd/playlists"
music_directory "/home/baal/hdd/music/FLAC"
bind_to_address "localhost"

audio_output {
	type "pulse"
	name "my_pulse"
	mixer_type "hardware"
	mixer_device "default"
	mixer_control "PCM"
}
