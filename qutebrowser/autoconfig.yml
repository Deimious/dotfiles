# If a config.py file exists, this file is ignored unless it's explicitly loaded
# via config.load_autoconfig(). For more information, see:
# https://github.com/qutebrowser/qutebrowser/blob/master/doc/help/configuring.asciidoc#loading-autoconfigyml
# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  bindings.commands:
    global:
      normal: {}
  colors.downloads.bar.bg:
    global: '#121212'
  colors.downloads.start.bg:
    global: '#d65d0e'
  colors.downloads.start.fg:
    global: '#121212'
  colors.downloads.stop.bg:
    global: '#98971a'
  colors.downloads.stop.fg:
    global: '#121212'
  colors.hints.bg:
    global: '#98971a'
  colors.hints.fg:
    global: '#121212'
  colors.keyhint.bg:
    global: '#98971a'
  colors.keyhint.fg:
    global: '#121212'
  colors.statusbar.insert.bg:
    global: '#d65d0e'
  colors.statusbar.insert.fg:
    global: '#121212'
  colors.webpage.bg:
    global: '#121212'
  completion.height:
    global: 100%
  content.user_stylesheets:
    global: /home/baal/.config/qutebrowser/globaldark.css
  downloads.position:
    global: bottom
  fonts.completion.category:
    global: bold 8pt default_family
  fonts.completion.entry:
    global: 8pt default_family
  fonts.default_family:
    global:
    - xos4 Terminus
  fonts.statusbar:
    global: 8pt default_family
  fonts.tabs:
    global: 8pt default_family
  scrolling.bar:
    global: never
  statusbar.position:
    global: bottom
  tabs.favicons.show:
    global: never
  tabs.position:
    global: top
  zoom.default:
    global: 80%
